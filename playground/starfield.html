<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfield — Ric's Playground</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #05060f; }
    canvas { display: block; }
    a.back {
      position: fixed; top: 1rem; left: 1rem;
      color: #9fb4ff; font-family: system-ui, sans-serif; font-size: 0.9rem;
      text-decoration: none; background: rgba(5, 6, 15, 0.6);
      padding: 0.35rem 0.7rem; border-radius: 999px; border: 1px solid #2a3163;
    }
    a.back:hover { color: #fff; }
    p.hint {
      position: fixed; bottom: 1rem; left: 0; right: 0; text-align: center;
      color: #5a6497; font-family: system-ui, sans-serif; font-size: 0.85rem;
      margin: 0; pointer-events: none;
    }
  </style>
</head>
<body>
  <a class="back" href="../exploration.html">← back to /exploration</a>
  <canvas id="sky"></canvas>
  <p class="hint">move your mouse to steer · click to hit warp speed</p>

  <script>
    const canvas = document.getElementById("sky");
    const ctx = canvas.getContext("2d");
    let W, H, cx, cy;

    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
      cx = W / 2; cy = H / 2;
    }
    resize();
    addEventListener("resize", resize);

    const STARS = 400;
    const stars = Array.from({ length: STARS }, () => spawn(true));

    function spawn(anywhere) {
      return {
        x: (Math.random() - 0.5) * W,
        y: (Math.random() - 0.5) * H,
        z: anywhere ? Math.random() * W : W,
      };
    }

    let speed = 4, targetSpeed = 4;
    let steerX = 0, steerY = 0;

    addEventListener("mousemove", (e) => {
      steerX = (e.clientX - cx) / cx;
      steerY = (e.clientY - cy) / cy;
    });
    addEventListener("mousedown", () => (targetSpeed = 40));
    addEventListener("mouseup", () => (targetSpeed = 4));
    addEventListener("touchstart", () => (targetSpeed = 40));
    addEventListener("touchend", () => (targetSpeed = 4));

    function frame() {
      speed += (targetSpeed - speed) * 0.05;
      ctx.fillStyle = `rgba(5, 6, 15, ${speed > 15 ? 0.25 : 0.6})`;
      ctx.fillRect(0, 0, W, H);

      for (const s of stars) {
        s.z -= speed;
        s.x -= steerX * speed * 2;
        s.y -= steerY * speed * 2;
        if (s.z <= 1) Object.assign(s, spawn(false));

        const k = 200 / s.z;
        const px = cx + s.x * k;
        const py = cy + s.y * k;
        if (px < 0 || px > W || py < 0 || py > H) { Object.assign(s, spawn(false)); continue; }

        const size = Math.max(0.3, 2.2 * (1 - s.z / W));
        const hue = 220 - (1 - s.z / W) * 40;
        ctx.fillStyle = `hsl(${hue}, 80%, ${60 + (1 - s.z / W) * 40}%)`;
        ctx.beginPath();
        ctx.arc(px, py, size, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
