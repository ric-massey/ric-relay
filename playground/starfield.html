<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfield — Ric's Playground</title>
  <meta name="description" content="Fly through Ric's starfield, dodge celestial hazards, and see how far you survive.">
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #05091a; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    a.back {
      position: fixed; top: 1rem; left: 1rem; z-index: 10;
      color: #9fb4ff; font-family: system-ui, sans-serif; font-size: 0.9rem;
      text-decoration: none; background: rgba(5, 6, 15, 0.6);
      padding: 0.35rem 0.7rem; border-radius: 999px; border: 1px solid #2a3163;
    }
    a.back:hover { color: #fff; }
    p.hint {
      position: fixed; bottom: 1rem; left: 0; right: 0; z-index: 10; text-align: center;
      color: #5a6497; font-family: system-ui, sans-serif; font-size: 0.85rem;
      margin: 0; pointer-events: none;
    }
    .distance {
      position: fixed; top: 1rem; right: 1rem; z-index: 10; min-width: 12rem;
      color: #d9e2ff; background: rgba(5,6,15,.7); border: 1px solid #2a3163;
      border-radius: 6px; padding: .5rem .7rem;
      font: 700 .78rem/1.25 ui-monospace, "SF Mono", Menlo, monospace;
      letter-spacing: .1em; text-transform: uppercase; pointer-events: none;
    }
    .distance .metric { display:flex;justify-content:space-between;gap:1rem;align-items:baseline; }
    .distance .metric + .metric { margin-top:.35rem;padding-top:.35rem;border-top:1px solid rgba(42,49,99,.65); }
    .distance span { color: #8faeff; font-size: .92rem; letter-spacing: .05em; text-transform:none; }
    .distance small { display:block;margin-top:.45rem;color:#4d577f;font-size:.55rem;letter-spacing:.08em; }
    .game-over {
      position: fixed; inset: 0; z-index: 20; display: grid; place-items: center;
      padding: 1.2rem; background: rgba(3,4,12,.78); backdrop-filter: blur(5px);
    }
    .game-over[hidden] { display: none; }
    .loss-card {
      width: min(92vw, 30rem); padding: 1.6rem; color: #cfd9ff; text-align: center;
      background: rgba(8,11,27,.96); border: 1px solid #48558d; box-shadow: 0 0 50px rgba(75,91,180,.2);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .loss-card .code { color: #ff6e86; font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; }
    .loss-card h1 { margin: .75rem 0 .5rem; color: #fff; font-size: clamp(1.7rem,8vw,3rem); letter-spacing: .12em; }
    .loss-card p { margin: .45rem 0 1.2rem; color: #8995bd; line-height: 1.55; }
    .loss-card button {
      border: 1px solid #6074c1; border-radius: 5px; padding: .65rem 1rem;
      color: #fff; background: #202c5b; cursor: pointer; font: 700 .75rem/1 ui-monospace,monospace;
      letter-spacing: .11em; text-transform: uppercase;
    }
    .loss-card button:hover,.loss-card button:focus-visible { background:#33468d;outline:2px solid #9fb4ff;outline-offset:3px; }
    @media (max-width: 560px) {
      .distance { top: 3.7rem; left: 1rem; right: auto; min-width: 11rem; }
      p.hint { padding: 0 1rem; font-size: .75rem; }
    }
  </style>
</head>
<body>
  <a class="back" href="../exploration.html">← back to /exploration</a>
  <canvas id="sky" aria-label="Starfield flight game"></canvas>
  <div class="distance" aria-live="off">
    <div class="metric">Speed <span id="speed">1.00 c</span></div>
    <div class="metric">Distance <span id="distance">0.0 light-sec</span></div>
    <small>galaxies are scenic · star systems collide</small>
  </div>
  <p class="hint">aim with your pointer · cruise: light speed · hold click, touch, or space: 10,000,000 c</p>

  <div class="game-over" id="game-over" role="dialog" aria-modal="true" aria-labelledby="loss-title" hidden>
    <div class="loss-card">
      <div class="code">Navigation failure</div>
      <h1 id="loss-title">SIGNAL LOST</h1>
      <p id="loss-detail">Collision detected.</p>
      <button id="restart" type="button">Relaunch</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("sky");
    const ctx = canvas.getContext("2d");
    const speedEl = document.getElementById("speed");
    const distanceEl = document.getElementById("distance");
    const gameOverEl = document.getElementById("game-over");
    const lossDetail = document.getElementById("loss-detail");
    const restartButton = document.getElementById("restart");
    const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const LIGHT_YEAR_SECONDS = 31557600;
    const CRUISE_C = 1;
    const WARP_C = 10000000;
    let W, H, cx, cy;

    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
      cx = W / 2; cy = H / 2;
    }
    resize();
    addEventListener("resize", resize);

    // Flight particles are intentionally sparse; the colored points behind them
    // are the actual distant stars.
    const DUST_COUNT = reducedMotion ? 28 : 52;
    const STAR_COUNT = reducedMotion ? 85 : 155;
    const GALAXY_COUNT = reducedMotion ? 4 : 7;
    let cameraX = 0, cameraY = 0;
    const dust = Array.from({ length: DUST_COUNT }, () => spawnDust(true));
    const skyStars = Array.from({ length: STAR_COUNT }, () => spawnSkyStar());
    const galaxies = [];
    const hazards = [];

    function depth() { return Math.max(900, W); }

    function spawnDust(anywhere) {
      return {
        x: cameraX + (Math.random() - 0.5) * W,
        y: cameraY + (Math.random() - 0.5) * H,
        z: anywhere ? Math.random() * depth() : depth(),
        hue: 195 + Math.random() * 55,
      };
    }

    function spawnSkyStar() {
      const colors = ["#8ebdff", "#b7d5ff", "#e6efff", "#fff4d6", "#ffd39a", "#ff9e85"];
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        size: .45 + Math.random() * 1.7,
        alpha: .35 + Math.random() * .55,
        phase: Math.random() * Math.PI * 2,
        color: colors[Math.floor(Math.random() * colors.length)],
      };
    }

    function spawnGalaxy(z = depth() * (3.5 + Math.random() * 7), screenX, screenY, kind) {
      const targetX = screenX ?? W * (.1 + Math.random() * .8);
      const targetY = screenY ?? H * (.08 + Math.random() * .76);
      const scale = Math.min(W, H) * .82 / z;
      const kinds = ["spiral", "spiral", "elliptical", "nebula"];
      return {
        type: "galaxy",
        kind: kind || kinds[Math.floor(Math.random() * kinds.length)],
        x: cameraX + (targetX - cx) / scale,
        y: cameraY + (targetY - cy) / scale,
        z,
        radius: 95 + Math.random() * 95,
        hue: 185 + Math.random() * 145,
        phase: Math.random() * Math.PI * 2,
      };
    }

    function seedDeepField() {
      galaxies.length = 0;
      galaxies.push(
        spawnGalaxy(depth() * 2.7, W * .22, H * .17, "spiral"),
        spawnGalaxy(depth() * 4.1, W * .76, H * .31, "elliptical"),
        spawnGalaxy(depth() * 5.6, W * .48, H * .73, "nebula"),
      );
      while (galaxies.length < GALAXY_COUNT) galaxies.push(spawnGalaxy());
    }
    seedDeepField();

    let speed = 4, targetSpeed = 4;
    let speedC = CRUISE_C, targetSpeedC = CRUISE_C;
    let steerX = 0, steerY = 0;
    let distanceLightSeconds = 0;
    let nextSystemAt = systemGap() * LIGHT_YEAR_SECONDS;
    let running = true;
    let last = performance.now();

    function systemGap() {
      // Nearby stars are generally separated by several light-years.
      return 2.8 + Math.random() * 5.8;
    }

    function addHazard(type, x, y, z, radius, extras = {}) {
      hazards.push({
        type, x, y, z, radius,
        hue: Math.floor(Math.random() * 360),
        ring: Math.random() > .75,
        phase: Math.random() * Math.PI * 2,
        ...extras,
      });
    }

    function spawnSystem(z = depth(), allowBlackHole = true, screenX, screenY) {
      const scale = Math.min(W, H) * .82 / z;
      const targetX = screenX ?? W * (.16 + Math.random() * .68);
      const targetY = screenY ?? H * (.14 + Math.random() * .68);
      const centerX = cameraX + (targetX - cx) / scale;
      const centerY = cameraY + (targetY - cy) / scale;
      // One in 500 systems replaces its star with a black hole.
      const centralType = allowBlackHole && Math.random() < .002 ? "black hole" : "star";
      const starColors = ["#b9d7ff", "#e7eeff", "#fff4ea", "#fff0b0", "#ffc07a", "#ff9270"];
      addHazard(
        centralType,
        centerX,
        centerY,
        z,
        centralType === "star" ? 75 + Math.random() * 45 : 22 + Math.random() * 22,
        { color: starColors[Math.floor(Math.random() * starColors.length)] },
      );

      const planetCount = centralType === "star" ? 1 + Math.floor(Math.random() * 4) : Math.floor(Math.random() * 2);
      for (let i = 0; i < planetCount; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const orbit = 55 + i * 42 + Math.random() * 35;
        const planetX = centerX + Math.cos(angle) * orbit;
        const planetY = centerY + Math.sin(angle) * orbit * .62;
        addHazard("planet", planetX, planetY, z + (Math.random() - .5) * 95, 3 + Math.random() * 5, {
          lightAngle: Math.atan2(centerY - planetY, centerX - planetX),
        });
        if (Math.random() < .34) {
          const moonAngle = angle + .7 + Math.random() * 1.8;
          addHazard(
            "moon",
            planetX + Math.cos(moonAngle) * (9 + Math.random() * 8),
            planetY + Math.sin(moonAngle) * (6 + Math.random() * 5),
            z + (Math.random() - .5) * 95,
            .65 + Math.random() * .75,
            { lightAngle: Math.atan2(centerY - planetY, centerX - planetX), hue: 215 },
          );
        }
      }

      if (Math.random() < .58) {
        const cometCount = 1 + (Math.random() < .2 ? 1 : 0);
        for (let i = 0; i < cometCount; i += 1) {
          addHazard(
            "comet",
            centerX + (Math.random() - .5) * 280,
            centerY + (Math.random() - .5) * 190,
            z + (Math.random() - .5) * 130,
            1.2 + Math.random() * 1.8,
          );
        }
      }
    }

    function seedLocalSystem() {
      hazards.length = 0;
      // A few nearby systems make the opening immediately readable. Later
      // systems still honor the several-light-year physical spacing counter.
      spawnSystem(depth() * 1.15, false, W * .34, H * .42);
      spawnSystem(depth() * 2.05, false, W * .72, H * .24);
      spawnSystem(depth() * 3.15, false, W * .55, H * .68);
    }
    seedLocalSystem();

    function setWarp(on) {
      if (!running) return;
      targetSpeed = on ? 34 : 4;
      targetSpeedC = on ? WARP_C : CRUISE_C;
    }

    addEventListener("mousemove", (e) => {
      steerX = (e.clientX - cx) / cx;
      steerY = (e.clientY - cy) / cy;
    });
    canvas.addEventListener("mousedown", () => setWarp(true));
    addEventListener("mouseup", () => setWarp(false));
    canvas.addEventListener("touchstart", (event) => {
      if (!running) return;
      event.preventDefault();
      setWarp(true);
      const touch = event.touches[0];
      steerX = (touch.clientX - cx) / cx;
      steerY = (touch.clientY - cy) / cy;
    }, { passive: false });
    canvas.addEventListener("touchmove", (event) => {
      event.preventDefault();
      const touch = event.touches[0];
      steerX = (touch.clientX - cx) / cx;
      steerY = (touch.clientY - cy) / cy;
    }, { passive: false });
    addEventListener("touchend", () => setWarp(false));
    addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        if (running) setWarp(true);
        else restart();
      } else if (!running && event.key.toLowerCase() === "r") restart();
    });
    addEventListener("keyup", (event) => {
      if (event.code === "Space") setWarp(false);
    });
    addEventListener("blur", () => setWarp(false));

    function project(object) {
      const scale = Math.min(W, H) * .82 / object.z;
      return {
        x: cx + (object.x - cameraX) * scale,
        y: cy + (object.y - cameraY) * scale,
        r: object.radius * scale,
      };
    }

    function drawBackdrop() {
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#111a3a");
      sky.addColorStop(.42, "#080d25");
      sky.addColorStop(1, "#030713");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      const clouds = [
        [W * .17, H * .02, Math.max(W, H) * .58, "rgba(56,74,176,.20)"],
        [W * .93, H * .28, Math.max(W, H) * .48, "rgba(121,43,142,.13)"],
        [W * .48, H * .92, Math.max(W, H) * .56, "rgba(20,116,139,.12)"],
      ];
      for (const [x, y, radius, color] of clouds) {
        const glow = ctx.createRadialGradient(x, y, 0, x, y, radius);
        glow.addColorStop(0, color);
        glow.addColorStop(1, "transparent");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawSkyStars(now, step) {
      for (const star of skyStars) {
        star.x -= steerX * .16 * step;
        star.y -= steerY * .16 * step;
        if (star.x < -8) star.x = W + 8;
        if (star.x > W + 8) star.x = -8;
        if (star.y < -8) star.y = H + 8;
        if (star.y > H + 8) star.y = -8;

        const twinkle = star.alpha * (.78 + Math.sin(now * .0014 + star.phase) * .22);
        ctx.globalAlpha = Math.max(.16, twinkle);
        ctx.fillStyle = star.color;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        if (star.size > 1.55) {
          ctx.strokeStyle = star.color;
          ctx.lineWidth = .55;
          ctx.beginPath();
          ctx.moveTo(star.x - star.size * 3.2, star.y);
          ctx.lineTo(star.x + star.size * 3.2, star.y);
          ctx.moveTo(star.x, star.y - star.size * 2.5);
          ctx.lineTo(star.x, star.y + star.size * 2.5);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
    }

    function drawGalaxy(galaxy, point) {
      const r = Math.max(5, point.r);
      ctx.save();
      ctx.translate(point.x, point.y);
      ctx.rotate(galaxy.phase);
      ctx.scale(1, galaxy.kind === "nebula" ? .7 : .48);
      ctx.globalCompositeOperation = "screen";

      if (galaxy.kind === "nebula") {
        for (let i = 0; i < 4; i += 1) {
          const x = Math.cos(galaxy.phase + i * 1.7) * r * .28;
          const y = Math.sin(galaxy.phase + i * 1.2) * r * .18;
          const cloud = ctx.createRadialGradient(x, y, 0, x, y, r * (.55 + i * .08));
          cloud.addColorStop(0, `hsla(${galaxy.hue + i * 24},72%,70%,.26)`);
          cloud.addColorStop(.45, `hsla(${galaxy.hue + i * 18},70%,48%,.13)`);
          cloud.addColorStop(1, "transparent");
          ctx.fillStyle = cloud;
          ctx.beginPath();ctx.arc(x,y,r*(.58+i*.06),0,Math.PI*2);ctx.fill();
        }
      } else {
        const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.25);
        glow.addColorStop(0, "rgba(255,249,226,.92)");
        glow.addColorStop(.08, `hsla(${galaxy.hue},80%,78%,.72)`);
        glow.addColorStop(.38, `hsla(${galaxy.hue + 32},72%,54%,.26)`);
        glow.addColorStop(1, "transparent");
        ctx.fillStyle = glow;
        ctx.beginPath();ctx.arc(0,0,r*1.25,0,Math.PI*2);ctx.fill();

        if (galaxy.kind === "spiral" && r > 7) {
          for (let arm = 0; arm < 3; arm += 1) {
            ctx.beginPath();
            for (let i = 0; i <= 34; i += 1) {
              const t = i / 34 * Math.PI * 2.25;
              const reach = r * .08 + r * .88 * (i / 34);
              const angle = t + arm * Math.PI * 2 / 3;
              const x = Math.cos(angle) * reach;
              const y = Math.sin(angle) * reach;
              if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.strokeStyle = `hsla(${galaxy.hue + arm * 18},90%,78%,.34)`;
            ctx.lineWidth = Math.max(.55, r * .045);
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }

    function glowCircle(x, y, radius, inner, outer) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, Math.max(1, radius * 2.4));
      gradient.addColorStop(0, inner);
      gradient.addColorStop(.38, outer);
      gradient.addColorStop(1, "transparent");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, Math.max(1, radius * 2.4), 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHazard(object, point) {
      const { x, y } = point;
      const r = Math.max(1.3, point.r);
      ctx.save();

      if (object.type === "star") {
        glowCircle(x, y, r, "#fff", object.color || "rgba(255,220,150,.7)");
        ctx.fillStyle = object.color || "#fff4cf";
        ctx.beginPath(); ctx.arc(x, y, Math.max(1.2, r * .72), 0, Math.PI * 2); ctx.fill();
      } else if (object.type === "planet" || object.type === "moon") {
        if (object.type === "planet" && object.ring) {
          ctx.strokeStyle = `hsla(${object.hue + 35},45%,62%,.65)`;
          ctx.lineWidth = Math.max(1,r*.15);ctx.beginPath();ctx.ellipse(x,y,r*1.55,r*.38,-.24,0,Math.PI*2);ctx.stroke();
        }
        // Planets reflect a nearby star: one lit side, one dark side, no glow.
        const lightX = x + Math.cos(object.lightAngle || 0) * r * .48;
        const lightY = y + Math.sin(object.lightAngle || 0) * r * .48;
        const gradient = ctx.createRadialGradient(lightX,lightY,r*.05,x,y,r*1.12);
        const saturation = object.type === "moon" ? 18 : 58;
        gradient.addColorStop(0, `hsl(${object.hue},${saturation}%,72%)`);
        gradient.addColorStop(.48, `hsl(${object.hue},${Math.max(12,saturation-10)}%,40%)`);
        gradient.addColorStop(1, `hsl(${object.hue},${Math.max(8,saturation-23)}%,5%)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      } else if (object.type === "comet") {
        const tail = ctx.createLinearGradient(x,y,x+r*7,y-r*3);
        tail.addColorStop(0,"rgba(190,231,255,.92)");tail.addColorStop(1,"transparent");
        ctx.strokeStyle=tail;ctx.lineWidth=Math.max(1.5,r*.55);ctx.lineCap="round";
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+r*7,y-r*3);ctx.stroke();
        glowCircle(x,y,r,"#fff","rgba(101,190,255,.7)");
        ctx.fillStyle="#eaf9ff";ctx.beginPath();ctx.arc(x,y,Math.max(1.2,r*.48),0,Math.PI*2);ctx.fill();
      } else {
        glowCircle(x,y,r*1.55,"rgba(176,128,255,.64)","rgba(65,112,255,.18)");
        ctx.strokeStyle="rgba(255,171,93,.92)";ctx.lineWidth=Math.max(2,r*.18);
        ctx.beginPath();ctx.ellipse(x,y,r*1.58,r*.48,object.phase,0,Math.PI*2);ctx.stroke();
        ctx.strokeStyle="rgba(112,180,255,.72)";ctx.lineWidth=Math.max(1,r*.08);
        ctx.beginPath();ctx.arc(x,y,r*.88,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle="#000107";ctx.beginPath();ctx.arc(x,y,r*.71,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }

    function crash(type) {
      running = false;
      targetSpeed = 0;
      targetSpeedC = 0;
      const objectName = type === "star" ? "a star" : type === "comet" ? "a comet" :
        type === "planet" ? "a planet" : type === "moon" ? "a moon" : "a black hole";
      lossDetail.textContent = `Collision with ${objectName}. Distance survived: ${formatDistance(distanceLightSeconds)}.`;
      gameOverEl.hidden = false;
      restartButton.focus();
    }

    function formatDistance(lightSeconds) {
      if (lightSeconds < 60) return `${lightSeconds.toFixed(1)} light-sec`;
      if (lightSeconds < 3600) return `${(lightSeconds / 60).toFixed(1)} light-min`;
      if (lightSeconds < 86400) return `${(lightSeconds / 3600).toFixed(1)} light-hours`;
      if (lightSeconds < LIGHT_YEAR_SECONDS) return `${(lightSeconds / 86400).toFixed(1)} light-days`;
      return `${(lightSeconds / LIGHT_YEAR_SECONDS).toFixed(3)} ly`;
    }

    function formatSpeed(value) {
      if (value < 10) return `${value.toFixed(2)} c`;
      return `${Math.round(value).toLocaleString()} c`;
    }

    function restart() {
      distanceLightSeconds = 0;
      nextSystemAt = systemGap() * LIGHT_YEAR_SECONDS;
      speed = 4;
      targetSpeed = 4;
      speedC = CRUISE_C;
      targetSpeedC = CRUISE_C;
      steerX = 0;
      steerY = 0;
      cameraX = 0;
      cameraY = 0;
      for (const particle of dust) Object.assign(particle, spawnDust(true));
      for (const star of skyStars) Object.assign(star, spawnSkyStar());
      seedDeepField();
      running = true;
      seedLocalSystem();
      gameOverEl.hidden = true;
      last = performance.now();
      speedEl.textContent = "1.00 c";
      distanceEl.textContent = "0.0 light-sec";
    }
    restartButton.addEventListener("click", restart);

    function drawReticle() {
      ctx.strokeStyle = "rgba(143,174,255,.35)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx,cy,10,0,Math.PI*2);
      ctx.moveTo(cx-18,cy);ctx.lineTo(cx-7,cy);
      ctx.moveTo(cx+7,cy);ctx.lineTo(cx+18,cy);
      ctx.moveTo(cx,cy-18);ctx.lineTo(cx,cy-7);
      ctx.moveTo(cx,cy+7);ctx.lineTo(cx,cy+18);
      ctx.stroke();
    }

    function frame(now) {
      const dt = Math.min(.04, (now - last) / 1000 || .016);
      last = now;
      const step = dt * 60;
      speed += (targetSpeed - speed) * Math.min(1, .05 * step);
      speedC += (targetSpeedC - speedC) * Math.min(1, .055 * step);
      drawBackdrop();
      drawSkyStars(now, step);

      const travel = running ? speed * step : Math.max(0, speed) * step;
      if (running) {
        distanceLightSeconds += speedC * dt;
        if (distanceLightSeconds >= nextSystemAt) {
          spawnSystem();
          nextSystemAt += systemGap() * LIGHT_YEAR_SECONDS;
        }
        speedEl.textContent = formatSpeed(speedC);
        distanceEl.textContent = formatDistance(distanceLightSeconds);
      }

      cameraX += steerX * travel * .62;
      cameraY += steerY * travel * .62;

      let visibleGalaxies = 0;
      for (let i = 0; i < galaxies.length; i += 1) {
        const galaxy = galaxies[i];
        galaxy.z -= travel * .2;
        if (galaxy.z <= 65) {
          galaxies[i] = spawnGalaxy(depth() * (5 + Math.random() * 7));
          continue;
        }
        const point = project(galaxy);
        if (point.x > -point.r*2 && point.x < W+point.r*2 && point.y > -point.r*2 && point.y < H+point.r*2) {
          drawGalaxy(galaxy, point);
          visibleGalaxies += 1;
        }
      }
      if (visibleGalaxies < 3 && Math.floor(now / 1800) !== Math.floor((now - dt * 1000) / 1800)) {
        const lost = galaxies.findIndex((galaxy) => {
          const point = project(galaxy);
          return point.x < -W || point.x > W * 2 || point.y < -H || point.y > H * 2;
        });
        if (lost >= 0) galaxies[lost] = spawnGalaxy(depth() * (4 + Math.random() * 5));
      }

      for (const s of dust) {
        s.z -= travel;
        if (s.z <= 1) Object.assign(s, spawnDust(false));

        const k = Math.min(W,H) * .82 / s.z;
        const px = cx + (s.x - cameraX) * k;
        const py = cy + (s.y - cameraY) * k;
        if (px < 0 || px > W || py < 0 || py > H) { Object.assign(s, spawnDust(false)); continue; }

        const near = 1 - s.z / depth();
        const size = Math.max(.3, 1.35 * near);
        ctx.strokeStyle = `hsla(${s.hue},72%,78%,${.2 + near * .48})`;
        ctx.lineWidth = Math.max(.45, size);
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px - (px - cx) * Math.min(.045, speed * .0012), py - (py - cy) * Math.min(.045, speed * .0012));
        ctx.stroke();
      }

      for (let i = hazards.length - 1; i >= 0; i -= 1) {
        const object = hazards[i];
        object.z -= travel;
        if (object.z <= 4) { hazards.splice(i,1); continue; }
        const point = project(object);
        if (point.x > -point.r*8 && point.x < W+point.r*8 && point.y > -point.r*8 && point.y < H+point.r*8) drawHazard(object,point);
        if (running && object.z < 105 && Math.hypot(point.x-cx,point.y-cy) < point.r + 10) {
          crash(object.type);
          hazards.splice(i,1);
        }
      }

      drawReticle();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
  <script src="../projects/relay-return.js" data-home="../index.html" data-egg="starfield" defer></script>
