<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>/captures — photographic records</title>
  <meta name="description" content="Ric Massey's photographic records.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ric's Relay">
  <meta property="og:title" content="Captures — Ric's Relay">
  <meta property="og:description" content="The contact sheet — frames from trips, walls, machines, and dogs.">
  <meta property="og:url" content="https://ric-massey.github.io/ric-relay/captures.html">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23141210'/><text y='.85em' font-size='70' x='15'>📷</text></svg>">
  <style>
    :root {
      --darkroom: #141210;
      --paper: #1e1b18;
      --amber-safe: #c9502c; /* safelight */
      --silver: #d8d3ca;
      --faint: #7d766c;
      --edge: #2c2823;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      background: var(--darkroom);
      color: var(--silver);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.65;
      background-image: radial-gradient(ellipse at 50% -20%, rgba(201, 80, 44, 0.09), transparent 60%);
    }

    .wrap { max-width: 880px; margin: 0 auto; padding: 2.2rem 1.25rem 4rem; }

    .masthead { margin-bottom: 2.5rem; }
    .masthead .brand { color: var(--silver); text-decoration: none; font-family: ui-monospace, Menlo, monospace; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.28em; }
    .masthead .brand:hover { color: var(--amber-safe); }
    .masthead .wing { font-family: ui-monospace, Menlo, monospace; color: var(--faint); font-size: 0.82rem; letter-spacing: 0.28em; }
    .masthead .welcome { color: var(--faint); font-size: 0.9rem; margin: 0.4rem 0 0.9rem; }
    /* darkroom film-strip nav */
    nav.filmstrip {
      font-family: ui-monospace, Menlo, monospace; display: flex; flex-wrap: wrap; gap: 0.3rem;
      background: #0f0d0b; border: 1px solid var(--edge);
      padding: 0.75rem 0.55rem;
      background-image:
        repeating-linear-gradient(90deg, #37322b 0 7px, transparent 7px 15px),
        repeating-linear-gradient(90deg, #37322b 0 7px, transparent 7px 15px);
      background-size: 15px 5px, 15px 5px;
      background-position: 4px 4px, 4px calc(100% - 4px);
      background-repeat: repeat-x, repeat-x;
    }
    nav.filmstrip a, nav.filmstrip .here {
      color: var(--faint); text-decoration: none; font-size: 0.72rem; letter-spacing: 0.08em;
      padding: 0.3rem 0.6rem; border: 1px solid var(--edge); background: var(--paper);
    }
    nav.filmstrip a:hover { color: var(--amber-safe); border-color: var(--amber-safe); }
    nav.filmstrip .here { color: #141210; background: var(--amber-safe); border-color: var(--amber-safe); font-weight: 700; }

    h1 {
      font-weight: 300;
      font-size: 1.9rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--amber-safe);
    }

    .subtitle { color: var(--faint); margin-top: 0.4rem; margin-bottom: 2.5rem; font-weight: 300; }

    .sheet { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1.1rem; }

    figure {
      margin: 0;
      background: var(--paper);
      border: 1px solid var(--edge);
      padding: 0.55rem 0.55rem 0.4rem;
    }

    figure img { width: 100%; height: 200px; object-fit: cover; display: block; filter: contrast(1.03); }

    figcaption {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.08em;
      padding-top: 0.45rem;
    }

    .empty {
      border: 1px dashed var(--edge);
      background: var(--paper);
      padding: 2.5rem 1.5rem;
      text-align: center;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      color: var(--faint);
    }
    .latest-capture{display:grid;grid-template-columns:auto 1fr auto;gap:.2rem 1rem;align-items:center;width:min(100%,760px);margin:1.3rem 0 1.8rem;padding:.9rem 1rem;color:var(--silver);text-decoration:none;background:var(--paper);border:1px solid var(--edge);border-left:6px solid var(--amber-safe);box-shadow:0 8px 25px rgba(0,0,0,.22)}
    .latest-capture .latest-kicker{grid-row:1/3;color:var(--amber-safe);font:700 .63rem/1.2 ui-monospace,Menlo,monospace;letter-spacing:.12em;text-transform:uppercase}
    .latest-capture .latest-title{font-size:.96rem}.latest-capture .latest-description{color:var(--faint);font-size:.78rem}
    .latest-capture .latest-meta{grid-column:3;grid-row:1/3;display:grid;gap:.2rem;color:var(--amber-safe);font:700 .62rem/1.2 ui-monospace,Menlo,monospace;text-align:right;text-transform:uppercase}
    .latest-capture:hover,.latest-capture:focus-visible{outline:2px solid var(--amber-safe);outline-offset:2px}
    @media(max-width:620px){.latest-capture{grid-template-columns:minmax(0,1fr) auto;padding:.65rem .75rem}.latest-capture .latest-kicker,.latest-capture .latest-title{grid-column:1;grid-row:auto}.latest-capture .latest-description{display:none}.latest-capture .latest-meta{grid-column:2;grid-row:1/3;display:grid;text-align:right}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <a class="brand" href="index.html">RIC'S RELAY</a><span class="wing"> · DARKROOM</span>
      <p class="welcome">Come in — mind the red light, prints are developing.</p>
      <nav class="filmstrip" aria-label="Relay rooms">
        <a href="index.html">relay</a>
        <a href="orrin.html">orrin</a>
        <a href="psyche.html">psyche</a>
        <a href="climbing.html">climbing</a>
        <a href="training.html">training</a>
        <a href="exploration.html">exploration</a>
        <a href="workbench.html">workbench</a>
        <span class="here" aria-current="page">captures</span>
        <a href="log.html">log</a>
      </nav>
    </header>

    <h1>Captures</h1>
    <p class="subtitle">The contact sheet. Frames from trips, walls, machines, and dogs.</p>

    <a class="latest-capture" data-latest-banner data-latest-prefix="fresh frame"></a>

    <div id="empty" class="empty" hidden>NO EXPOSURES DEVELOPED YET — FILM STILL IN THE CAMERA</div>
    <div id="sheet" class="sheet"></div>
  </div>

  <script src="effects.js"></script>
  <script src="latest.js"></script>
  <script>
    // ═══════════════════════════════════════════════════════
    //  TO ADD PHOTOS:
    //  1. Drop image files into the photos/ folder
    //  2. Add an entry for each at the TOP of this list
    // ═══════════════════════════════════════════════════════

    const FRAMES = [
      { src: "photos/climbing-01.jpg", caption: "FRAME 001" },
      { src: "photos/climbing-02.jpg", caption: "FRAME 002" },
      { src: "photos/climbing-03.jpg", caption: "FRAME 003" },
      { src: "photos/climbing-04.jpg", caption: "FRAME 004" },
      { src: "photos/climbing-05.jpg", caption: "FRAME 005" },
      { src: "photos/climbing-06.jpg", caption: "FRAME 006" },
      { src: "photos/climbing-07.jpg", caption: "FRAME 007" },
      { src: "photos/climbing-08.jpg", caption: "FRAME 008" },
      { src: "photos/climbing-09.jpg", caption: "FRAME 009" },
      { src: "photos/climbing-10.jpg", caption: "FRAME 010" },
      { src: "photos/climbing-11.jpg", caption: "FRAME 011" },
      { src: "photos/climbing-12.jpg", caption: "FRAME 012" },
      { src: "photos/climbing-13.jpg", caption: "FRAME 013" },
      { src: "photos/climbing-14.jpg", caption: "FRAME 014" },
      { src: "photos/climbing-15.jpg", caption: "FRAME 015" },
      { src: "photos/climbing-16.jpg", caption: "FRAME 016" },
      { src: "photos/climbing-17.jpg", caption: "FRAME 017" },
      { src: "photos/climbing-18.jpg", caption: "FRAME 018" },
      { src: "photos/climbing-19.jpg", caption: "FRAME 019" },
      { src: "photos/climbing-20.jpg", caption: "FRAME 020" },
      { src: "photos/climbing-21.jpg", caption: "FRAME 021" },
      { src: "photos/climbing-22.jpg", caption: "FRAME 022" },
      { src: "photos/climbing-23.jpg", caption: "FRAME 023" },
      { src: "photos/climbing-24.jpg", caption: "FRAME 024" },
      { src: "photos/climbing-25.jpg", caption: "FRAME 025" },
      { src: "photos/climbing-26.jpg", caption: "FRAME 026" },
      { src: "photos/climbing-27.jpg", caption: "FRAME 027" },
      { src: "photos/climbing-28.jpg", caption: "FRAME 028" },
      { src: "photos/climbing-29.jpg", caption: "FRAME 029" },
      { src: "photos/climbing-30.jpg", caption: "FRAME 030" },
      { src: "photos/climbing-31.jpg", caption: "FRAME 031" },
      { src: "photos/climbing-32.jpg", caption: "FRAME 032" },
      { src: "photos/climbing-33.jpg", caption: "FRAME 033" },
      { src: "photos/climbing-34.jpg", caption: "FRAME 034" },
      { src: "photos/climbing-35.jpg", caption: "FRAME 035" },
      { src: "photos/climbing-36.jpg", caption: "FRAME 036" },
      { src: "photos/climbing-37.jpg", caption: "FRAME 037" },
      { src: "photos/climbing-38.jpg", caption: "FRAME 038" },
    ];

    const sheet = document.getElementById("sheet");
    if (FRAMES.length === 0) document.getElementById("empty").hidden = false;
    for (const f of FRAMES) {
      const fig = document.createElement("figure");
      const img = document.createElement("img");
      img.src = f.src;
      img.alt = f.caption || "";
      img.loading = "lazy";
      fig.appendChild(img);
      const cap = document.createElement("figcaption");
      cap.textContent = f.caption || "";
      fig.appendChild(cap);
      sheet.appendChild(fig);
    }
  </script>
</body>
</html>
