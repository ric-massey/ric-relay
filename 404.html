<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — SIGNAL LOST // RIC'S RELAY</title>
  <meta name="description" content="That page isn't on the relay. Signal lost.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='70' x='15' fill='%23ffb000'>▮</text></svg>">
  <style>
    :root {
      --bg: #0a0a0a;
      --phosphor: #ffb000;
      --phosphor-dim: #8a6200;
      --phosphor-faint: #3d2c00;
      --ok: #38ff9c;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--bg);
      color: var(--phosphor);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 15px; line-height: 1.7; min-height: 100vh;
      display: grid; place-items: center;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(255, 176, 0, 0.04), transparent 50%),
        repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,0.012) 2px 4px);
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 3px),
        radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    .plate {
      border: 1px solid var(--phosphor-faint);
      max-width: 560px; margin: 1.25rem; padding: 2rem 2.2rem;
      box-shadow: 0 0 40px rgba(255, 176, 0, 0.05) inset;
    }
    .label { color: var(--phosphor-dim); font-size: 0.75rem; letter-spacing: 0.25em; margin-bottom: 1.2rem; }
    h1 { font-size: clamp(2.4rem, 12vw, 4rem); letter-spacing: 0.1em; text-shadow: 0 0 18px rgba(255, 176, 0, 0.55); }
    .tag { color: var(--phosphor-dim); margin: 0.2rem 0 1.4rem; }
    p { color: var(--phosphor-dim); margin-bottom: 0.9rem; }
    .cursor { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    a.home {
      display: inline-block; margin-top: 0.8rem;
      color: var(--phosphor); text-decoration: none;
      border: 1px solid var(--phosphor-faint); border-left: 3px solid var(--phosphor-dim);
      padding: 0.55rem 0.9rem;
    }
    a.home:hover { border-color: var(--ok); color: var(--ok); text-shadow: 0 0 12px var(--ok); }
    a.home:hover::after { content: " →"; }
  </style>
</head>
<body>
  <div class="plate">
    <div class="label">RIC-MASSEY PERSONAL RELAY // ERR 404</div>
    <h1>404</h1>
    <p class="tag">signal lost.</p>
    <p>the directory you tried to reach isn't mounted on this relay — bad address,
      moved, or never existed. <span class="cursor">▮</span></p>
    <p>no coordinates were harmed. head back to the hub and pick a room.</p>
    <a class="home" href="index.html">return to the relay</a>
  </div>
</body>
</html>
