# The Shape of Harm — Netlify configuration
#
# The site is a single hand-written index.html with all CSS and JS inline, plus
# the published data and audit files served alongside it. There is no build step and nothing
# to install: Netlify only has to copy the directory.
#
# Routing is entirely hash-based (#ranking, #safety, #w=5,5,5,5,5) and the page
# never calls history.pushState with a path, so NO SPA redirect rule is needed.
# Adding one would be actively wrong here — it would mask genuine 404s.

[build]
  publish = "."

# Netlify's post-processing minifiers occasionally mangle inline scripts that use
# template literals and regex literals, which this page is full of. There is no
# build step to re-run if that happens, so leave the bytes alone.
[build.processing]
  skip_processing = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"

# The document changes whenever the analysis does; never let a proxy pin it.

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Data files are the reproducibility claim. Serve them as text so they open in a
# browser tab rather than downloading as an opaque blob, and keep them fresh.
[[headers]]
  for = "/scores.csv"
  [headers.values]
    Content-Type = "text/csv; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"
